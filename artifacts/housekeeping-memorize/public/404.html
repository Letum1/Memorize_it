<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <meta http-equiv="refresh" content="0;url=/">
  <script>
    // SPA fallback: redirect to root so client-side router takes over
    sessionStorage.setItem('spa-path', window.location.pathname + window.location.search + window.location.hash);
    window.location.replace('/');
  </script>
</head>
<body>
  <p>Redirecting to home...</p>
</body>
</html>
